name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
  workflow_call:
    inputs:
      model-path:
        description: "Glob pattern for .zip model files to validate"
        required: true
        type: string
      java-version:
        description: "Java version to use"
        required: false
        type: string
        default: "21"
      checker-ref:
        description: "Git ref of eventb-checker to build"
        required: false
        type: string
        default: "main"
      show-info:
        description: "Include INFO-severity findings in output"
        required: false
        type: boolean
        default: false
      proofs:
        description: "Check proof status from .bpr/.bpo/.bps files"
        required: false
        type: boolean
        default: false
    outputs:
      valid:
        description: "Whether all models passed validation (true/false)"
        value: ${{ jobs.validate-models.outputs.valid }}
      error-count:
        description: "Total number of errors across all models"
        value: ${{ jobs.validate-models.outputs.error-count }}
      warning-count:
        description: "Total number of warnings across all models"
        value: ${{ jobs.validate-models.outputs.warning-count }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_call' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - run: ./gradlew build

  validate-models:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.validate.outputs.valid }}
      error-count: ${{ steps.validate.outputs.error-count }}
      warning-count: ${{ steps.validate.outputs.warning-count }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: eventb-rossi/eventb-checker
          ref: ${{ inputs.checker-ref }}
          path: _checker

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - uses: gradle/actions/setup-gradle@v6

      - name: Build checker
        run: ./gradlew -p _checker installDist

      - name: Validate models
        id: validate
        shell: bash
        env:
          CHECKER_CMD: "_checker/build/install/eventb-checker/bin/eventb-checker"
          MODEL_GLOB: ${{ inputs.model-path }}
          SHOW_INFO_FLAG: ${{ inputs.show-info == true && '--show-info' || '' }}
          PROOFS_FLAG: ${{ inputs.proofs == true && '--proofs' || '' }}
        run: bash _checker/.github/scripts/validate-models.sh
